<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poko Terminal</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" sizes="16x16" type="image/png" href="images/poko-icon.ico" />
  </head>
  <body>
    <img src="images/poko-logo.webp" id="siteLogo" alt="Logo" />
    <div class="terminal-window" id="terminalWindow">
      <div class="title-bar" id="titleBar">
        <div class="window-controls">
          <button id="close"></button>
          <button id="maximize"></button>
          <button id="minimize"></button>
        </div>
      </div>
      <div class="tabs">
        <div class="tab active-tab">Poko</div>
      </div>
      <div class="content">
        <div class="terminal" id="terminalContent"></div>
        <div class="log" id="logContent"></div>
      </div>
      <div class="input-wrapper">
        <input type="text" id="cmdInput" autofocus />
      </div>
    </div>
    <div class="taskbar">
      <div class="p-button" id="pButton">P</div>
      <div style="display: flex; gap: 10px">
        <a href="https://www.facebook.com/pokodayou" target="_blank"
          ><img
            src="https://img.icons8.com/?size=100&id=118497&format=png&color=000000"
            alt="Facebook"
        /></a>
        <a href="https://x.com/Poko_miko" target="_blank"
          ><img
            src="https://img.icons8.com/?size=100&id=phOKFKYpe00C&format=png&color=000000"
            alt="X"
        /></a>
        <a
          href="https://vrchat.com/home/user/usr_21c3ad19-5da2-4f9b-b373-0d0d8af38c7a"
          target="_blank"
          ><img src="images/VRChat.webp" alt="VRChat"
        /></a>
      </div>
    </div>
    <div id="imageSlider">
      <img src="images/slide1.webp" class="slide active" alt="Slide 1" />
      <img src="images/slide2.webp" class="slide" alt="Slide 2" />
      <img src="images/slide3.webp" class="slide" alt="Slide 3" />
      <img src="images/slide4.webp" class="slide" alt="Slide 4" />
      <img src="images/slide5.webp" class="slide" alt="Slide 5" />
      <img src="images/slide6.webp" class="slide" alt="Slide 6" />
      <img src="images/slide7.webp" class="slide" alt="Slide 7" />
      <img src="images/slide8.webp" class="slide" alt="Slide 8" />
      <img src="images/slide9.webp" class="slide" alt="Slide 9" />
      <img src="images/slide10.webp" class="slide" alt="Slide 10" />
      <button class="nav prev">&#10094;</button>
      <button class="nav next">&#10095;</button>
    </div>
    <script src="script.js"></script>

    <div class="terminal-dashboard">
      <div class="terminal-header">Poko $help</div>
      <div class="terminal-body">
        <p>
          <span class="prompt">poko@pokomiko:~$</span> Type 'help' in the
          command line for assistance.
        </p>
        <p>
          bash: Type 'help' in the command line for assistance.: command not
          found
        </p>
        <p></p>
      </div>
    </div>
  </body>
</html>
